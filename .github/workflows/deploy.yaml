name: Build CI/CD

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Compile binary
        run: go build -o myapp
    id: compile
  test:
    runs-on: ubuntu-latest
    steps:
      - name: run tests
        id: run_tests
        run: go test ./...
      - name: compile binary
        uses: jobs.compile
        if: steps.run_tests.outcome == 'success'
